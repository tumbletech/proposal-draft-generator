<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Proposal Draft Generator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
margin-bottom:5px;
}

.subtitle{
color:#555;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;
box-sizing:border-box;
}

.button-row{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 18px;
background:#0077cc;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#005fa3;
}

.secondary{
background:#6c757d;
}

.secondary:hover{
background:#545b62;
}

#output{
margin-top:35px;
background:#fafafa;
padding:25px;
border:1px solid #ddd;
border-radius:6px;
min-height:40px;
}

#output h3{
color:#0077cc;
margin-top:20px;
}

.note{
margin-top:20px;
font-size:14px;
color:#555;
border-top:1px solid #ddd;
padding-top:10px;
}

.loading{
color:#666;
font-style:italic;
}

</style>

</head>

<body>

<div class="container">

<h1>Proposal Draft Generator</h1>
<p class="subtitle">
Turn a project brief into a structured engineering proposal draft in seconds.
</p>

<form id="proposalForm">

<label>Client Name</label>
<input type="text" id="client">

<label>Project Name</label>
<input type="text" id="project">

<label>Project Location</label>
<input type="text" id="location">

<label>Project Type</label>
<select id="type">
<option>Land Development</option>
<option>Road / Infrastructure</option>
<option>Water / Sewer</option>
<option>Environmental</option>
<option>General Engineering</option>
</select>

<label>Project Objective</label>
<textarea id="objective"></textarea>

<label>Deliverables</label>
<textarea id="deliverables"></textarea>

<label>Expected Timeline</label>
<input type="text" id="timeline">

<div class="button-row">

<button type="button" class="secondary" onclick="fillSampleData()">
Use Sample Data
</button>

<button type="button" onclick="generateDraft()">
Generate Proposal Draft
</button>

<button type="button" class="secondary" onclick="clearForm()">
Clear Form
</button>

</div>

</form>

<div id="output"></div>

</div>

<script>

function fillSampleData(){

document.getElementById("client").value = "ABC Land Development Corporation"
document.getElementById("project").value = "Riverside Estates Site Development"
document.getElementById("location").value = "Cavite"
document.getElementById("type").value = "Land Development"
document.getElementById("objective").value = "Prepare engineering design and documentation for site development works"
document.getElementById("deliverables").value = "Site development plans, drainage layout, grading plan, cost estimate"
document.getElementById("timeline").value = "45 calendar days"

}

function clearForm(){

document.getElementById("proposalForm").reset()
document.getElementById("output").innerHTML = ""

}

async function generateDraft(){

const client = document.getElementById("client").value
const project = document.getElementById("project").value
const location = document.getElementById("location").value
const type = document.getElementById("type").value
const objective = document.getElementById("objective").value
const deliverables = document.getElementById("deliverables").value
const timeline = document.getElementById("timeline").value

document.getElementById("output").innerHTML = "<p class='loading'>Generating AI proposal draft...</p>"

try{

const response = await fetch("https://tumbletech.app.n8n.cloud/webhook-test/proposal-generator", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
client,
project,
location,
type,
objective,
deliverables,
timeline
})

})

const data = await response.json()

document.getElementById("output").innerHTML = `
<h2>Proposal Draft</h2>
${data.proposal}

<p class="note">
Note: This draft is automatically generated for initial reference. 
Final proposals should be reviewed and finalized by the engineering team.
</p>
`

}catch(error){

document.getElementById("output").innerHTML =
"<p style='color:red'>Error generating proposal. Please check the n8n workflow.</p>"

}

}

</script>

</body>
</html>
